name: Release

on:
  push:
    tags:
      - "v*"

# Least privilege at the top level; only the publish job needs write.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  CARGO_INCREMENTAL: "0"

jobs:
  fmt-clippy:
    name: fmt + clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (toolchain pinned by rust-toolchain.toml)
        run: |
          rustup show
          rustup component add rustfmt clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-fmt-clippy

      - name: Install Linux GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libssl-dev

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Cache cargo-deny advisory DB
        uses: actions/cache@v6
        with:
          path: ~/.cargo/advisory-dbs
          key: cargo-deny-advisory-db-${{ runner.os }}-v1
          restore-keys: |
            cargo-deny-advisory-db-${{ runner.os }}-

      - name: cargo deny check
        run: cargo deny check

  test:
    name: test (${{ matrix.os }})
    needs: [fmt-clippy, cargo-deny]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (toolchain pinned by rust-toolchain.toml)
        run: rustup show

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-test-${{ matrix.os }}

      - name: Install Linux GUI deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libssl-dev

      - name: cargo test --workspace
        run: cargo test --workspace --locked

  build-windows:
    name: build windows_${{ matrix.arch }}
    needs: [test]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (toolchain pinned by rust-toolchain.toml)
        run: rustup show

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-win-${{ matrix.arch }}

      - name: Build release binary
        # Single dual-mode binary: `dynobox-gui` runs the egui front-end
        # with no args and dispatches into `dynobox_cli::cli_main` when
        # invoked with any args. Releases ship this binary renamed to
        # `dynobox.exe`.
        run: cargo build --release --locked -p dynobox-gui

      - name: Stage artifact
        id: stage
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = $env:GITHUB_REF_NAME
          $stageBasename = "DynoBox-windows_${{ matrix.arch }}-$tag"
          $stageDir = "stage/$stageBasename"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Copy-Item target/release/dynobox-gui.exe "$stageDir/dynobox.exe"
          if (-not (Test-Path README.md)) { throw "missing README.md at repo root" }
          if (-not (Test-Path LICENSE))   { throw "missing LICENSE at repo root" }
          Copy-Item README.md $stageDir
          Copy-Item LICENSE   $stageDir
          $zipName = "$stageBasename.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path $stageDir -DestinationPath $zipName
          $hash = (Get-FileHash -Algorithm SHA256 $zipName).Hash.ToLowerInvariant()
          Set-Content -NoNewline -Path "$zipName.sha256" -Value "$hash  $zipName`n"
          "zip=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows_${{ matrix.arch }}-${{ github.ref_name }}
          path: |
            ${{ steps.stage.outputs.zip }}
            ${{ steps.stage.outputs.zip }}.sha256
          if-no-files-found: error

  build-linux:
    name: build linux_${{ matrix.arch }}
    needs: [test]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (toolchain pinned by rust-toolchain.toml)
        run: rustup show

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-linux-${{ matrix.arch }}

      - name: Install Linux GUI deps
        # eframe (glow + wayland + x11) and rfd need system dev libraries
        # that the bare ubuntu runners don't ship.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libssl-dev

      - name: Build release binary
        run: cargo build --release --locked -p dynobox-gui

      - name: Stage artifact
        id: stage
        # tar.gz preserves the executable bit on `dynobox` (zip on Linux
        # erases it, leaving users to `chmod +x` after extract).
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          stage_basename="DynoBox-linux_${{ matrix.arch }}-${tag}"
          stage_dir="stage/${stage_basename}"
          mkdir -p "${stage_dir}"
          cp target/release/dynobox-gui "${stage_dir}/dynobox"
          chmod +x "${stage_dir}/dynobox"
          [[ -f README.md ]] || { echo "missing README.md at repo root" >&2; exit 1; }
          [[ -f LICENSE ]]   || { echo "missing LICENSE at repo root" >&2; exit 1; }
          cp README.md "${stage_dir}/"
          cp LICENSE   "${stage_dir}/"
          tar_name="${stage_basename}.tar.gz"
          (
            cd stage
            tar -cf - "${stage_basename}" | gzip -9 > "../${tar_name}"
          )
          sha256sum "${tar_name}" | awk '{print $1"  "$2}' > "${tar_name}.sha256"
          echo "tarball=${tar_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux_${{ matrix.arch }}-${{ github.ref_name }}
          path: |
            ${{ steps.stage.outputs.tarball }}
            ${{ steps.stage.outputs.tarball }}.sha256
          if-no-files-found: error

  build-macos:
    name: build macos_universal
    needs: [test]
    # Single Apple Silicon runner builds both slices and lipo's a universal app.
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (toolchain pinned by rust-toolchain.toml)
        run: |
          rustup show
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-macos-universal

      - name: Build universal DynoBox.app + zip
        # make-app.sh builds both Mac arches, lipo's the universal binary,
        # assembles + ad-hoc-signs DynoBox.app, and packages it as a .zip.
        # No Developer ID here — set MACOS_SIGN_IDENTITY to enable hardened
        # runtime signing when secrets are available.
        run: bash ./misc/macos/make-app.sh

      - name: Stage artifact
        id: stage
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          zip_name="DynoBox-macos_universal-${tag}.zip"
          mv "dist/macos/DynoBox-macos-universal.zip" "${zip_name}"
          shasum -a 256 "${zip_name}" | awk '{print $1"  "$2}' > "${zip_name}.sha256"
          echo "zip=${zip_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos_universal-${{ github.ref_name }}
          path: |
            ${{ steps.stage.outputs.zip }}
            ${{ steps.stage.outputs.zip }}.sha256
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [fmt-clippy, cargo-deny, test, build-windows, build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/DynoBox-windows_x86_64-*.zip
            artifacts/**/DynoBox-windows_x86_64-*.zip.sha256
            artifacts/**/DynoBox-windows_arm64-*.zip
            artifacts/**/DynoBox-windows_arm64-*.zip.sha256
            artifacts/**/DynoBox-linux_x86_64-*.tar.gz
            artifacts/**/DynoBox-linux_x86_64-*.tar.gz.sha256
            artifacts/**/DynoBox-linux_arm64-*.tar.gz
            artifacts/**/DynoBox-linux_arm64-*.tar.gz.sha256
            artifacts/**/DynoBox-macos_universal-*.zip
            artifacts/**/DynoBox-macos_universal-*.zip.sha256
